<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>压力单位换算器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>压力单位换算器</h2>
        <label for="value">输入值：</label>
        <input type="number" id="value" placeholder="输入数值" step="any">
        
        <label for="fromUnit">从单位：</label>
        <select id="fromUnit">
            <option value="mbar">毫巴 (mbar)</option>
            <option value="mTorr">毫托 (mTorr)</option>
            <option value="Pa">帕斯卡 (Pa)</option>
        </select>
        
        <label for="toUnit">到单位：</label>
        <select id="toUnit">
            <option value="mbar">毫巴 (mbar)</option>
            <option value="mTorr">毫托 (mTorr)</option>
            <option value="Pa">帕斯卡 (Pa)</option>
        </select>

        <button onclick="convert()">换算</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        function convert() {
            var value = parseFloat(document.getElementById('value').value);
            var fromUnit = document.getElementById('fromUnit').value;
            var toUnit = document.getElementById('toUnit').value;

            if (isNaN(value) || value === "") {
                document.getElementById('result').textContent = '请输入一个数值';
                return;
            }

            var resultInPa;
            switch (fromUnit) {
                case 'mbar':
                    resultInPa = value * 100; // 毫巴转换为帕斯卡
                    break;
                case 'mTorr':
                    resultInPa = value * 0.133; // 毫托转换为帕斯卡
                    break;
                case 'Pa':
                    resultInPa = value; // 已经是帕斯卡
                    break;
            }

            var result;
            switch (toUnit) {
                case 'mbar':
                    result = resultInPa / 100;
                    break;
                case 'mTorr':
                    result = resultInPa / 0.133;
                    break;
                case 'Pa':
                    result = resultInPa;
                    break;
            }

            var resultText = `${value} ${fromUnit} = ${result.toFixed(5)} ${toUnit}`;
            document.getElementById('result').textContent = `换算结果: ${resultText}`;
        }
    </script>
</body>
</html>
